<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM_TERMINAL_V1.0.6</title>
    <style>
        /* ESTILO TERMINAL FALLOUT PRESERVADO */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --amber: #ffb000; --amber-dim: #945f00; --bg: #0d0d0d; --scanline: rgba(255, 176, 0, 0.03); }
        * { box-sizing: border-box; font-family: 'VT323', monospace; color: var(--amber); text-transform: uppercase; }
        body { margin: 0; background: var(--bg); letter-spacing: 1px; font-size: 1.1rem; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(var(--scanline) 50%, rgba(0, 0, 0, 0) 50%); background-size: 100% 3px; z-index: 1000; pointer-events: none; }
        header { border-bottom: 2px solid var(--amber); padding: 10px 20px; display: flex; justify-content: space-between; text-shadow: 0 0 5px var(--amber); }
        .sidebar { border-bottom: 2px solid var(--amber); display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; } .section.active { display: block; }
        .card { border: 1px solid var(--amber); padding: 15px; margin-bottom: 20px; background: rgba(255, 176, 0, 0.02); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        input, select { background: transparent; border: 1px solid var(--amber-dim); padding: 10px; width: 100%; font-size: 1.2rem; outline: none; }
        input:focus { border: 1px solid var(--amber); box-shadow: 0 0 5px var(--amber); }
        .btn { background: transparent; border: none; padding: 5px 15px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn:hover { background: var(--amber); color: var(--bg); font-weight: bold; }
        .table-terminal { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid var(--amber); }
        .table-terminal th, .table-terminal td { padding: 10px; text-align: left; border: 1px solid var(--amber-dim); }
        .order-item { border: 1px solid var(--amber); margin-bottom: 10px; padding: 10px; }
        @media (min-width: 768px) { .main-layout { display: flex; } .sidebar { width: 250px; flex-direction: column; border-right: 2px solid var(--amber); border-bottom: none; min-height: 90vh; } }
    </style>
</head>
<body>

<header>
    <div>NEXTCOM_OS > V1.0.6</div>
    <div>SISTEMA_DE_PURGA_HABILITADO</div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <button class="btn" onclick="nav('dash')">[ PANEL_ORDENES ]</button>
        <button class="btn" onclick="nav('new')">[ NUEVA_ORDEN ]</button>
        <button class="btn" onclick="nav('inv')">[ INV_REPUESTOS ]</button>
        <button class="btn" onclick="nav('acc')">[ INV_ACCESORIOS ]</button>
        <button class="btn" onclick="nav('ventas')">[ PUNTO_VENTA ]</button>
    </div>

    <div class="container">
        <div id="sec-dash" class="section active">
            <h2>> REGISTROS_ACTIVOS</h2>
            <div id="orders-list">ACCEDIENDO...</div>
        </div>

        <div id="sec-new" class="section">
            <div class="card">
                <h2>> REGISTRO_UNIDAD</h2>
                <div class="grid">
                    <input type="text" id="o-cliente" placeholder="CLIENTE">
                    <input type="number" id="o-tel" placeholder="TEL">
                    <input type="text" id="o-modelo" placeholder="MODELO">
                    <input type="text" id="o-falla" placeholder="FALLA">
                </div>
                <div class="grid" style="margin-top:10px">
                    <input type="number" id="o-costo" oninput="calcSaldo()" placeholder="COSTO">
                    <input type="number" id="o-anticipo" oninput="calcSaldo()" placeholder="ANTICIPO">
                    <input type="number" id="o-saldo" readonly placeholder="SALDO">
                </div>
                <button class="btn" onclick="saveOrder()">[ GUARDAR ]</button>
            </div>
        </div>

        <div id="sec-inv" class="section">
            <div class="card">
                <h2>> ALMACEN_REPUESTOS</h2>
                <div class="grid">
                    <input type="text" id="i-tipo" placeholder="TIPO">
                    <input type="text" id="i-modelo" placeholder="MODELO">
                    <input type="number" id="i-precio" placeholder="PRECIO">
                    <input type="number" id="i-stock" placeholder="STOCK">
                </div>
                <button class="btn" onclick="saveInv('rep')">[ AGREGAR_REP ]</button>
                <table class="table-terminal">
                    <thead><tr><th>TIPO</th><th>MODELO</th><th>PRECIO</th><th>STOCK</th><th>[ACC]</th></tr></thead>
                    <tbody id="rep-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-acc" class="section">
            <div class="card">
                <h2>> ALMACEN_ACCESORIOS</h2>
                <div class="grid">
                    <input type="text" id="a-nombre" placeholder="NOMBRE">
                    <input type="number" id="a-pv" placeholder="PRECIO_V">
                    <input type="number" id="a-stock" placeholder="CANTIDAD">
                </div>
                <button class="btn" onclick="saveInv('acc')">[ AGREGAR_ACC ]</button>
                <table class="table-terminal">
                    <thead><tr><th>NOMBRE</th><th>STOCK</th><th>ACCIONES</th></tr></thead>
                    <tbody id="acc-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-ventas" class="section">
            <div class="grid">
                <div class="card">
                    <h2>> VENTA</h2>
                    <input type="text" id="v-search" list="list-acc" oninput="checkAcc()" placeholder="BUSCAR...">
                    <div id="v-info"></div>
                    <button class="btn" onclick="addToCart()">[ AGREGAR ]</button>
                </div>
                <div class="card">
                    <h2>> CARRO</h2>
                    <div id="cart-items"></div>
                    <div style="font-size:1.5rem">TOTAL: $<span id="v-total">0</span></div>
                    <button class="btn" onclick="finishSale()">[ CONFIRMAR ]</button>
                </div>
            </div>
            <div class="card"><h2>> HISTORIAL</h2><div id="sales-history"></div></div>
        </div>
    </div>
</div>

<datalist id="list-rep"></datalist>
<datalist id="list-acc"></datalist>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let localAcc = [];
    let cart = [];

    window.nav = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
    };

    // --- FUNCION UNIVERSAL DE ELIMINACION ---
    window.purgarRegistro = async (coleccion, id) => {
        if(confirm("¿SOLICITA ELIMINACION DEFINITIVA DEL REGISTRO " + id.substring(0,5) + "?")) {
            await deleteDoc(doc(db, coleccion, id));
        }
    };

    // --- REPUESTOS RENDER ---
    onSnapshot(query(collection(db, "inventario"), orderBy("ts", "desc")), (snap) => {
        const table = document.getElementById('rep-table');
        const dl = document.getElementById('list-rep');
        table.innerHTML = ""; dl.innerHTML = "";
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            table.innerHTML += `<tr>
                <td>${data.tipo}</td><td>${data.modelo}</td><td>$${data.precio}</td><td>${data.stock}</td>
                <td><button class="btn" onclick="purgarRegistro('inventario','${id}')">[-]</button></td>
            </tr>`;
            dl.innerHTML += `<option value="${data.modelo}">`;
        });
    });

    // --- ACCESORIOS RENDER ---
    onSnapshot(query(collection(db, "accesorios"), orderBy("ts", "desc")), (snap) => {
        const table = document.getElementById('acc-table');
        const dl = document.getElementById('list-acc');
        table.innerHTML = ""; dl.innerHTML = ""; localAcc = [];
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            localAcc.push({...data, id});
            table.innerHTML += `<tr>
                <td>${data.nombre}</td><td>${data.stock}</td>
                <td>
                    <button class="btn" onclick="updateStock('${id}', ${data.stock}, 1)">[+]</button>
                    <button class="btn" onclick="purgarRegistro('accesorios','${id}')">[-]</button>
                </td>
            </tr>`;
            dl.innerHTML += `<option value="${data.nombre}">`;
        });
    });

    // --- LOGICA RESTANTE MANTENIDA ---
    window.saveInv = async (t) => {
        let col = t === 'rep' ? 'inventario' : 'accesorios';
        let data = t === 'rep' ? 
            { tipo: document.getElementById('i-tipo').value, modelo: document.getElementById('i-modelo').value, precio: document.getElementById('i-precio').value, stock: document.getElementById('i-stock').value, ts: new Date() } :
            { nombre: document.getElementById('a-nombre').value, pv: document.getElementById('a-pv').value, stock: parseInt(document.getElementById('a-stock').value), ts: new Date() };
        await addDoc(collection(db, col), data);
        alert("SISTEMA_ACTUALIZADO");
    };

    window.updateStock = async (id, cur, n) => { await updateDoc(doc(db, "accesorios", id), { stock: cur + n }); };
    window.calcSaldo = () => {
        const c = parseFloat(document.getElementById('o-costo').value) || 0;
        const a = parseFloat(document.getElementById('o-anticipo').value) || 0;
        document.getElementById('o-saldo').value = c - a;
    };
    window.saveOrder = async () => {
        const o = { cliente: document.getElementById('o-cliente').value, tel: document.getElementById('o-tel').value, modelo: document.getElementById('o-modelo').value, falla: document.getElementById('o-falla').value, costo: document.getElementById('o-costo').value, anticipo: document.getElementById('o-anticipo').value, saldo: document.getElementById('o-saldo').value, estado: 'RECIBIDO', fecha: new Date().toISOString() };
        await addDoc(collection(db, "ordenes"), o); nav('dash');
    };
    onSnapshot(query(collection(db, "ordenes"), orderBy("fecha", "desc")), (snap) => {
        const list = document.getElementById('orders-list'); list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            list.innerHTML += `<div class="order-item">ID: ${id.substring(0,5)} | ${data.cliente} | ${data.modelo}<br>
            <button class="btn" onclick="purgarRegistro('ordenes','${id}')">[ PURGAR ]</button></div>`;
        });
    });
</script>
</body>
</html>
