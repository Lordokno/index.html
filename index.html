<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Sitio Privado</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Ingresar Datos</h2>
    <form id="miFormulario">
        <input type="text" id="nombre" placeholder="Nombre del dato" required>
        <input type="number" id="valor" placeholder="Valor o cantidad" required>
        <button type="submit">Guardar en Firebase</button>
    </form>

    <div id="mensaje"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN (Pega aquí lo que copiaste de tu consola de Firebase)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica del Formulario
        const formulario = document.getElementById('miFormulario');
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const valor = document.getElementById('valor').value;

            try {
                // Guardar en la colección "mis_registros"
                await addDoc(collection(db, "mis_registros"), {
                    nombre: nombre,
                    valor: valor,
                    fecha: new Date()
                });
                document.getElementById('mensaje').innerText = "¡Guardado con éxito!";
                formulario.reset();
            } catch (error) {
                console.error("Error al guardar: ", error);
            }
        });
    </script>
</body>
</html>
