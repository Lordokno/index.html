<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM_TERMINAL_V1.0.4</title>
    <style>
        /* --- ESTILO FALLOUT TERMINAL --- */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --amber: #ffb000;
            --amber-dim: #945f00;
            --bg: #0d0d0d;
            --scanline: rgba(255, 176, 0, 0.03);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'VT323', 'Courier New', monospace; 
            color: var(--amber);
            text-transform: uppercase;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            overflow-x: hidden;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        /* Efecto de líneas de escaneo */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(var(--scanline) 50%, rgba(0, 0, 0, 0) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            z-index: 1000;
            pointer-events: none;
        }

        header { 
            border-bottom: 2px solid var(--amber); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            text-shadow: 0 0 5px var(--amber);
        }

        .sidebar { 
            border-bottom: 2px solid var(--amber); 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            padding: 10px;
        }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; } 
        .section.active { display: block; }

        .card { 
            border: 1px solid var(--amber); 
            padding: 15px; 
            margin-bottom: 20px; 
            background: rgba(255, 176, 0, 0.02);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }

        input, select, textarea { 
            background: transparent; 
            border: 1px solid var(--amber-dim); 
            padding: 10px; 
            width: 100%; 
            font-size: 1.2rem;
            outline: none;
        }
        input:focus { border: 1px solid var(--amber); box-shadow: 0 0 5px var(--amber); }

        .btn { 
            background: transparent; 
            border: none; 
            padding: 5px 15px; 
            cursor: pointer; 
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .btn:hover { background: var(--amber); color: var(--bg); font-weight: bold; }
        
        .table-terminal { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            border: 1px solid var(--amber); 
        }
        .table-terminal th, .table-terminal td { 
            padding: 10px; 
            text-align: left; 
            border: 1px solid var(--amber-dim); 
        }

        .order-item { border: 1px solid var(--amber); margin-bottom: 10px; padding: 10px; }
        
        /* Cursor parpadeante */
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background: var(--amber); animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        @media (min-width: 768px) {
            .main-layout { display: flex; }
            .sidebar { width: 250px; flex-direction: column; border-right: 2px solid var(--amber); border-bottom: none; height: 90vh; }
        }
    </style>
</head>
<body>

<header>
    <div>NEXTCOM_OS > V1.0.4</div>
    <div>TERMINAL_ACTIVA <span class="cursor"></span></div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <button class="btn" onclick="nav('dash')">[ PANEL_ORDENES ]</button>
        <button class="btn" onclick="nav('new')">[ NUEVA_ORDEN ]</button>
        <button class="btn" onclick="nav('inv')">[ INV_REPUESTOS ]</button>
        <button class="btn" onclick="nav('acc')">[ INV_ACCESORIOS ]</button>
        <button class="btn" onclick="nav('ventas')">[ PUNTO_VENTA ]</button>
    </div>

    <div class="container">
        <div id="sec-dash" class="section active">
            <h2>> LISTADO_DE_EQUIPOS</h2>
            <div id="orders-list">Cargando datos del sector...</div>
        </div>

        <div id="sec-new" class="section">
            <div class="card">
                <h2>> REGISTRO_DE_UNIDAD</h2>
                <div class="grid">
                    <div><label>CLIENTE</label><input type="text" id="o-cliente"></div>
                    <div><label>TEL_CONTACTO</label><input type="number" id="o-tel"></div>
                    <div><label>MODELO_UNIDAD</label><input type="text" id="o-modelo" list="list-rep" oninput="logicAutoFill()"></div>
                    <div><label>FALLA_SINTOMA</label><select id="o-falla"><option>PANTALLA_DANIADA</option><option>FALLA_ENERGIA</option><option>CARGA_LENTA</option></select></div>
                </div>
                <div class="grid" style="margin-top:20px">
                    <div><label>COSTO_EST</label><input type="number" id="o-costo" oninput="calcSaldo()"></div>
                    <div><label>ANTICIPO</label><input type="number" id="o-anticipo" oninput="calcSaldo()"></div>
                    <div><label>SALDO</label><input type="number" id="o-saldo" readonly></div>
                </div>
                <button class="btn" style="margin-top:20px" onclick="saveOrder()">[ EJECUTAR_GUARDADO ]</button>
            </div>
        </div>

        <div id="sec-acc" class="section">
            <div class="card">
                <h2>> GESTION_ACCESORIOS</h2>
                <div class="grid">
                    <input type="text" id="a-nombre" placeholder="NOMBRE_ITEM">
                    <input type="number" id="a-pv" placeholder="PRECIO_VENTA">
                    <input type="number" id="a-stock" placeholder="CANTIDAD">
                </div>
                <button class="btn" style="margin-top:10px" onclick="saveInv('acc')">[ REGISTRAR_ITEM ]</button>
                <table class="table-terminal">
                    <thead><tr><th>ID_NOM</th><th>STOCK</th><th>ACCIONES</th></tr></thead>
                    <tbody id="acc-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-ventas" class="section">
            <div class="grid">
                <div class="card">
                    <h2>> TERMINAL_VENTA</h2>
                    <input type="text" id="v-search" list="list-acc" placeholder="BUSCAR_ACCESORIO..." oninput="checkAcc()">
                    <div id="v-info" style="margin:10px 0"></div>
                    <button class="btn" onclick="addToCart()">[ AGREGAR_A_LISTA ]</button>
                </div>
                <div class="card">
                    <h2>> RESUMEN_TRANSACCION</h2>
                    <div id="cart-items"></div>
                    <div style="font-size:1.5rem; text-align:right">TOTAL: $<span id="v-total">0</span></div>
                    <button class="btn" style="width:100%" onclick="finishSale()">[ CONFIRMAR_VENTA ]</button>
                </div>
            </div>
        </div>
        
        <div id="sec-inv" class="section">
            <div class="card">
                <h2>> ALMACEN_REPUESTOS</h2>
                <div class="grid">
                    <input type="text" id="i-tipo" placeholder="CATEGORIA">
                    <input type="text" id="i-modelo" placeholder="MODELO_COMPATIBLE">
                    <input type="number" id="i-precio" placeholder="PRECIO">
                    <input type="number" id="i-stock" placeholder="EXISTENCIA">
                </div>
                <button class="btn" style="margin-top:10px" onclick="saveInv('rep')">[ AGREGAR_AL_SISTEMA ]</button>
            </div>
        </div>
    </div>
</div>

<datalist id="list-rep"></datalist>
<datalist id="list-acc"></datalist>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let localAcc = [];
    let cart = [];

    // --- NAVEGACIÓN ---
    window.nav = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
    };

    // --- CORRECCIÓN ELIMINAR ORDEN ---
    window.eliminarOrden = async (id) => {
        if(confirm("¿CONFIRMA PURGADO DE DATOS DE LA ORDEN " + id + "?")) {
            try {
                await deleteDoc(doc(db, "ordenes", id));
                console.log("ORDEN_ELIMINADA_EXITOSAMENTE");
            } catch (error) {
                console.error("ERROR_EN_PURGADO: ", error);
            }
        }
    };

    // --- LÓGICA DE ÓRDENES ---
    onSnapshot(query(collection(db, "ordenes"), orderBy("fecha", "desc")), (snap) => {
        const list = document.getElementById('orders-list');
        list.innerHTML = "";
        snap.forEach(documento => {
            const d = documento.data();
            const id = documento.id;
            list.innerHTML += `
                <div class="order-item">
                    <div>ID: ${id.substring(0,6)} | CLIENTE: ${d.cliente}</div>
                    <div>MODELO: ${d.modelo} | ESTADO: ${d.estado} | SALDO: $${d.saldo}</div>
                    <div style="margin-top:10px">
                        <button class="btn" onclick="updateStatus('${id}', 'TERMINADO')">[ TERMINAR ]</button>
                        <button class="btn" onclick="enviarWA('${id}')">[ WHATSAPP ]</button>
                        <button class="btn" onclick="eliminarOrden('${id}')">[ ELIMINAR ]</button>
                    </div>
                </div>`;
        });
    });

    window.saveOrder = async () => {
        const o = {
            cliente: document.getElementById('o-cliente').value,
            tel: document.getElementById('o-tel').value,
            modelo: document.getElementById('o-modelo').value,
            falla: document.getElementById('o-falla').value,
            costo: document.getElementById('o-costo').value,
            anticipo: document.getElementById('o-anticipo').value,
            saldo: document.getElementById('o-saldo').value,
            estado: 'RECIBIDO',
            fecha: new Date().toISOString()
        };
        await addDoc(collection(db, "ordenes"), o);
        nav('dash');
    };

    window.calcSaldo = () => {
        const c = parseFloat(document.getElementById('o-costo').value) || 0;
        const a = parseFloat(document.getElementById('o-anticipo').value) || 0;
        document.getElementById('o-saldo').value = c - a;
    };

    // --- ACCESORIOS Y VENTAS ---
    window.saveInv = async (tipo) => {
        if(tipo === 'acc') {
            await addDoc(collection(db, "accesorios"), {
                nombre: document.getElementById('a-nombre').value,
                pv: document.getElementById('a-pv').value,
                stock: parseInt(document.getElementById('a-stock').value),
                ts: new Date()
            });
        }
        alert("REGISTRO_COMPLETADO");
    };

    onSnapshot(query(collection(db, "accesorios"), orderBy("ts", "desc")), (snap) => {
        const table = document.getElementById('acc-table');
        const dl = document.getElementById('list-acc');
        table.innerHTML = ""; dl.innerHTML = ""; localAcc = [];
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            localAcc.push({...data, id});
            table.innerHTML += `<tr>
                <td>${data.nombre}</td>
                <td>${data.stock}</td>
                <td><button class="btn" onclick="updateStock('${id}', ${data.stock}, 1)">[ + ]</button></td>
            </tr>`;
            dl.innerHTML += `<option value="${data.nombre}">`;
        });
    });

    window.checkAcc = () => {
        const val = document.getElementById('v-search').value;
        const item = localAcc.find(a => a.nombre === val);
        document.getElementById('v-info').innerText = item ? `UNITARIO: $${item.pv} | DISPONIBLE: ${item.stock}` : "NO_ENCONTRADO";
    };

    window.addToCart = () => {
        const val = document.getElementById('v-search').value;
        const item = localAcc.find(a => a.nombre === val);
        if(item && item.stock > 0) {
            cart.push(item);
            renderCart();
        }
    };

    function renderCart() {
        const c = document.getElementById('cart-items');
        c.innerHTML = ""; let t = 0;
        cart.forEach((i, index) => {
            t += parseFloat(i.pv);
            c.innerHTML += `<div>> ${i.nombre} - $${i.pv}</div>`;
        });
        document.getElementById('v-total').innerText = t;
    }

</script>
</body>
</html>
