<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXTCOM OS v2.6 PRO</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    getDocs, 
    doc, 
    runTransaction, 
    addDoc, 
    updateDoc, 
    query, 
    where,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_AUTH_DOMAIN",
    projectId: "TU_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.firestore = {
    collection, getDocs, doc, runTransaction, addDoc, updateDoc, query, where, getDoc
  };
</script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  background:black;
  color:#ff7a00;
  font-family:"Courier New", monospace;
}
header{
  padding:10px;
  border-bottom:1px solid #ff7a00;
}
button{
  background:black;
  color:#ff7a00;
  border:1px solid #ff7a00;
  padding:5px 10px;
  margin:3px;
  cursor:pointer;
}
button:hover{
  background:#ff7a00;
  color:black;
}
.section{
  padding:15px;
}
.product{
  border-bottom:1px solid #333;
  padding:8px;
}
.low{ color:yellow; }
.out{ color:red; }
#boot{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
}
.cart{
  border-top:1px solid #ff7a00;
  margin-top:10px;
  padding-top:10px;
}
canvas{
  background:black;
}
</style>
</head>

<body>

<div id="boot"></div>

<header>
  NEXTCOM OS v2.6 PRO
  <button onclick="showSection('inventory')">INVENTARIO</button>
  <button onclick="showSection('stats')">ESTADISTICAS</button>
</header>

<div id="inventory" class="section"></div>
<div id="stats" class="section" style="display:none;">
  <canvas id="salesChart"></canvas>
</div>

<script type="module">

const { collection, getDocs, doc, runTransaction, addDoc, getDoc } = window.firestore;
const db = window.db;

let cart = [];

const bootMessages = [
"> BOOTING NEXTCOM OS v2.6 PRO...",
"> Cargando Inventario... OK",
"> Cargando Facturación... OK",
"> Sistema listo."
];

let i=0;
const bootDiv = document.getElementById("boot");

function bootSystem(){
  if(i<bootMessages.length){
    bootDiv.innerHTML+=bootMessages[i]+"<br>";
    i++;
    setTimeout(bootSystem,500);
  }else{
    setTimeout(()=>{
      bootDiv.style.display="none";
      loadInventory();
    },1000);
  }
}
bootSystem();

window.showSection=function(id){
  document.getElementById("inventory").style.display="none";
  document.getElementById("stats").style.display="none";
  document.getElementById(id).style.display="block";
  if(id==="stats") generateChart();
}

async function loadInventory(){
  const snapshot = await getDocs(collection(db,"inventario"));
  const container=document.getElementById("inventory");
  container.innerHTML="<h3>INVENTARIO</h3>";

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    let status="";
    let cls="";
    if(data.stock<=0){status="OUT";cls="out";}
    else if(data.stock<=data.stockMinimo){status="LOW";cls="low";}

    container.innerHTML+=`
    <div class="product">
      ${data.nombre} - Stock: ${data.stock}
      <span class="${cls}">${status}</span><br>
      <button onclick="addToCart('${docSnap.id}','${data.nombre}',${data.precio})">+</button>
      <button onclick="restock('${docSnap.id}')">+STOCK</button>
      <button onclick="adjust('${docSnap.id}')">-STOCK</button>
    </div>
    `;
  });

  renderCart();
}

window.addToCart=function(id,name,price){
  cart.push({id,name,price});
  renderCart();
}

function renderCart(){
  const container=document.getElementById("inventory");
  let html="<div class='cart'><h3>CARRITO</h3>";
  let total=0;
  cart.forEach((item,i)=>{
    total+=item.price;
    html+=`${item.name} - $${item.price} <button onclick="removeItem(${i})">-</button><br>`;
  });
  html+=`<br>TOTAL: $${total}<br>
  <button onclick="processSale()">CONFIRMAR VENTA</button>
  </div>`;
  container.innerHTML+=html;
}

window.removeItem=function(index){
  cart.splice(index,1);
  loadInventory();
}

async function processSale(){
  if(cart.length===0) return alert("Carrito vacío");

  const cliente=prompt("Nombre del cliente:");
  if(!cliente) return;

  let total=cart.reduce((a,b)=>a+b.price,0);

  for(const item of cart){
    const ref=doc(db,"inventario",item.id);
    await runTransaction(db,async(transaction)=>{
      const snap=await transaction.get(ref);
      const data=snap.data();
      if(data.stock<=0) throw "Stock insuficiente";
      transaction.update(ref,{stock:data.stock-1});
    });
  }

  await addDoc(collection(db,"facturas"),{
    clienteNombre:cliente,
    total:total,
    estado:"ACTIVA",
    fecha:new Date()
  });

  alert("VENTA REGISTRADA");
  cart=[];
  loadInventory();
}

async function generateChart(){
  const snapshot=await getDocs(collection(db,"facturas"));
  let total=0;
  snapshot.forEach(doc=>{
    if(doc.data().estado==="ACTIVA"){
      total+=doc.data().total;
    }
  });

  new Chart(document.getElementById("salesChart"),{
    type:'bar',
    data:{
      labels:["Ventas Totales"],
      datasets:[{
        label:"$",
        data:[total],
        borderColor:"#ff7a00",
        backgroundColor:"transparent"
      }]
    }
  });
}

</script>

</body>
</html>
