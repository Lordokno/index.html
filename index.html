<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextcom Multiservicios - Gestión Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #5f6368;
            --success: #28a745;
            --warning: #fbbc04;
            --danger: #d93025;
            --bg: #f8f9fa;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: #3c4043; padding-bottom: 50px; }
        
        /* LOGIN */
        #login-page { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--primary); }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        
        /* NAV & TABS */
        nav { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-tabs { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 10px; border-bottom: 1px solid #ddd; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 600; color: var(--secondary); }
        .tab-btn.active { background: var(--primary); color: white; }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* CARDS */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid #ccc; position: relative; }
        
        /* COLORES POR ESTADO */
        .status-Recibido { border-left-color: #4285f4; }
        .status-Diagnóstico { border-left-color: #fbbc04; }
        .status-Reparación { border-left-color: #e67c73; }
        .status-Terminado { border-left-color: #34a853; }
        .status-Entregado { border-left-color: #bdc1c6; }

        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-top: 5px; margin-bottom: 15px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-whatsapp { background: #25D366; color: white; margin-top: 10px; }
        .btn-danger { background: none; color: var(--danger); font-size: 12px; margin-top: 10px; border: 1px solid var(--danger); }

        .header-card { display: flex; justify-content: space-between; align-items: flex-start; }
        .price-info { text-align: right; color: var(--primary); font-weight: bold; }
        label { font-size: 12px; font-weight: bold; color: var(--secondary); }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <h1 style="color:var(--primary); margin:0;">NEXTCOM</h1>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña" style="margin-top:10px;">
        <button class="btn btn-primary" style="margin-top:20px;" onclick="login()">Ingresar</button>
    </div>
</div>

<div id="app" style="display:none;">
    <nav>
        <span style="font-weight:bold; font-size:18px;">NEXTCOM MULTISERVICIOS</span>
        <span onclick="logout()" style="cursor:pointer; font-size:12px;">Salir</span>
    </nav>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('dashboard')">Panel</button>
        <button class="tab-btn" onclick="showTab('nuevo')">+ Nueva Orden</button>
    </div>

    <div class="container">
        
        <div id="nuevo" class="section">
            <div class="card" style="border-left-color: var(--primary)">
                <h3>📋 Datos de Orden</h3>
                <label>Nombre Cliente</label><input type="text" id="n-cliente">
                <label>WhatsApp (ej: 503...)</label><input type="number" id="n-tel">
                <label>Equipo (Marca/Modelo)</label><input type="text" id="n-equipo">
                <label>Falla</label><input type="text" id="n-falla">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Costo $</label><input type="number" id="n-costo" oninput="calc()"></div>
                    <div><label>Anticipo $</label><input type="number" id="n-anticipo" oninput="calc()"></div>
                </div>
                <div style="background:#f1f3f4; padding:10px; border-radius:8px; text-align:center; font-weight:bold;">
                    Saldo Pendiente: $<span id="n-saldo">0</span>
                </div>
                <button class="btn btn-primary" style="margin-top:15px;" onclick="guardar()">CREAR ORDEN</button>
            </div>
        </div>

        <div id="dashboard" class="section active">
            <div id="lista-ordenes"></div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // LOGIN
    window.login = () => {
        if(document.getElementById('user').value === "Nextcom" && document.getElementById('pass').value === "1234") {
            localStorage.setItem('next_session', 'true');
            location.reload();
        }
    };
    if(localStorage.getItem('next_session')) {
        document.getElementById('login-page').style.display='none';
        document.getElementById('app').style.display='block';
    }
    window.logout = () => { localStorage.removeItem('next_session'); location.reload(); };

    // TABS
    window.showTab = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    };

    window.calc = () => {
        const c = document.getElementById('n-costo').value || 0;
        const a = document.getElementById('n-anticipo').value || 0;
        document.getElementById('n-saldo').innerText = c - a;
    };

    // GUARDAR
    window.guardar = async () => {
        const d = {
            cliente: document.getElementById('n-cliente').value,
            tel: document.getElementById('n-tel').value,
            equipo: document.getElementById('n-equipo').value,
            falla: document.getElementById('n-falla').value,
            costo: document.getElementById('n-costo').value,
            anticipo: document.getElementById('n-anticipo').value,
            saldo: document.getElementById('n-saldo').innerText,
            estado: 'Recibido',
            ts: new Date()
        };
        if(!d.cliente || !d.tel) return alert("Faltan datos");
        await addDoc(collection(db, "ordenes"), d);
        enviarWA(d, "Recibido");
        alert("Orden registrada!");
        showTab('dashboard');
    };

    window.cambiarEstado = async (id, nuevo) => {
        await updateDoc(doc(db, "ordenes", id), { estado: nuevo });
    };

    window.enviarWA = (d, est) => {
        let msg = `📱 *NEXTCOM MULTISERVICIOS*%0A%0A*Equipo:* ${d.equipo}%0A*Falla:* ${d.falla}%0A`;
        if(est === "Recibido") msg += `*Estado:* 📥 Recibido correctamente. Saldo: $${d.saldo}`;
        else if(est === "Diagnóstico") msg += `*Estado:* 🔍 Ya está en diagnóstico técnico.`;
        else if(est === "Reparación") msg += `*Estado:* 🔧 Ya estamos trabajando en la reparación.`;
        else if(est === "Terminado") msg += `✅ *¡ESTÁ LISTO!*%0A*${d.cliente}*, ya puedes retirar tu equipo. Saldo: $${d.saldo}`;
        else msg += `✅ Equipo entregado. ¡Gracias!`;
        
        window.open(`https://wa.me/${d.tel}?text=${msg}`, '_blank');
    };

    // MOSTRAR LISTA
    const q = query(collection(db, "ordenes"), orderBy("ts", "desc"));
    onSnapshot(q, (snaps) => {
        const list = document.getElementById('lista-ordenes');
        list.innerHTML = "";
        snaps.forEach(s => {
            const d = s.data();
            const id = s.id;
            const item = document.createElement('div');
            item.className = `card status-${d.estado}`;
            item.innerHTML = `
                <div class="header-card">
                    <div>
                        <strong style="font-size:18px;">${d.cliente}</strong><br>
                        <span style="color:var(--secondary)">${d.equipo}</span>
                    </div>
                    <div class="price-info">Saldo: $${d.saldo}</div>
                </div>
                <p style="margin:10px 0; font-size:14px;"><strong>Falla:</strong> ${d.falla}</p>
                
                <label>Actualizar Estado:</label>
                <select onchange="cambiarEstado('${id}', this.value)">
                    <option value="Recibido" ${d.estado=='Recibido'?'selected':''}>Recibido</option>
                    <option value="Diagnóstico" ${d.estado=='Diagnóstico'?'selected':''}>En Diagnóstico</option>
                    <option value="Reparación" ${d.estado=='Reparación'?'selected':''}>En Reparación</option>
                    <option value="Terminado" ${d.estado=='Terminado'?'selected':''}>Terminado / Listo</option>
                    <option value="Entregado" ${d.estado=='Entregado'?'selected':''}>Entregado</option>
                </select>

                <button class="btn btn-whatsapp" onclick='enviarWA(${JSON.stringify(d)}, "${d.estado}")'>
                    WhatsApp (${d.estado})
                </button>
                <button class="btn btn-danger" onclick="eliminar('${id}')">Eliminar Registro</button>
            `;
            list.appendChild(item);
        });
    });

    window.eliminar = async (id) => { if(confirm("¿Borrar definitivamente?")) await deleteDoc(doc(db, "ordenes", id)); };

</script>
</body>
</html>
