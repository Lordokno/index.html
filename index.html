<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM OS v3.0 PRO // TERMINAL</title>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --amber: #ff7a00;
            --amber-dim: #944a00;
            --bg: #050505;
            --crt-glow: rgba(255, 122, 0, 0.05);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--amber);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* --- EFECTOS CRT --- */
        .crt-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 9999;
        }

        .scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent, var(--crt-glow) 50%, transparent);
            background-size: 100% 8px;
            animation: scan 10s linear infinite;
            pointer-events: none; z-index: 10000;
        }

        @keyframes scan { from { transform: translateY(-100%); } to { transform: translateY(100%); } }

        /* --- PANTALLA DE CARGA --- */
        #boot {
            position: fixed; inset: 0;
            background: #000; z-index: 10001;
            padding: 40px; display: flex; flex-direction: column;
            font-size: 1.2rem; line-height: 1.5;
        }

        /* --- LAYOUT --- */
        #app {
            display: none; height: 100vh;
        }

        .sidebar {
            width: 240px; border-right: 1px solid var(--amber);
            padding: 20px; background: #000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .main { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg); }

        /* --- UI ELEMENTS --- */
        .btn {
            background: transparent; border: 1px solid var(--amber);
            color: var(--amber); padding: 10px; cursor: pointer;
            font-family: 'Share Tech Mono'; transition: 0.2s;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--amber); color: #000; box-shadow: 0 0 10px var(--amber); }

        .btn-del { border-color: #ff4444; color: #ff4444; margin-left: 10px; padding: 2px 8px; }
        .btn-del:hover { background: #ff4444; color: #000; }

        input, select {
            background: #0a0a0a; border: 1px solid var(--amber-dim);
            color: var(--amber); padding: 10px; width: 100%;
            margin-bottom: 15px; font-family: 'Share Tech Mono';
            box-sizing: border-box;
        }

        .grid-responsive {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; border-bottom: 2px solid var(--amber); padding: 10px; color: #fff; }
        td { padding: 10px; border-bottom: 1px solid var(--amber-dim); }

        .card { border: 1px solid var(--amber-dim); padding: 15px; margin-bottom: 15px; position: relative; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }

        .section { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }

        #reorder-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 2px solid var(--amber); padding: 25px; z-index: 10005;
            display: none; width: 350px; box-shadow: 0 0 30px #000;
        }
    </style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="scanline"></div>

<div id="boot"><div id="boot-log"></div></div>

<div id="reorder-modal">
    <h3>[ REABASTECER_PRODUCTO ]</h3>
    <p id="re-nombre">---</p>
    <input type="number" id="re-qty" placeholder="CANTIDAD">
    <button class="btn" onclick="confirmReorder()" style="width: 100%;">EJECUTAR</button><br><br>
    <button class="btn" onclick="closeReorder()" style="width: 100%; border-color: gray;">ABORTAR</button>
</div>

<div id="app">
    <div class="sidebar">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">NEXTCOM OS v3.0</div>
        <button class="btn" onclick="nav('dash')">01_DASHBOARD</button>
        <button class="btn" onclick="nav('inv')">02_INVENTARIO</button>
        <button class="btn" onclick="nav('pos')">03_POS_VENTA</button>
        <button class="btn" onclick="nav('orden')">04_ORDENES</button>
    </div>

    <div class="main">
        <div id="sec-dash" class="section active">
            <h2>> SYSTEM_STATUS</h2>
            <div class="card">
                <div id="clock" style="font-size: 40px;">00:00:00</div>
                <div id="date-display">YYYY-MM-DD</div>
            </div>
        </div>

        <div id="sec-inv" class="section">
            <h2>> CONTROL_DE_INVENTARIO</h2>
            <div class="card">
                <div class="grid-responsive">
                    <input id="a-nom" placeholder="NOMBRE DEL PRODUCTO">
                    <input id="a-stock" type="number" placeholder="STOCK INICIAL">
                    <input id="a-costo" type="number" placeholder="COSTO UNITARIO">
                    <input id="a-pv" type="number" placeholder="PRECIO AL PUBLICO">
                </div>
                <button class="btn" onclick="saveAccesorio()" style="width: 100%;">REGISTRAR ITEM</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>PRODUCTO</th><th>STOCK</th><th>DATA</th><th>ACCIONES</th></tr></thead>
                    <tbody id="acc-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-pos" class="section">
            <h2>> PUNTO_DE_VENTA</h2>
            <div class="grid-responsive">
                <div>
                    <input id="pos-search" placeholder="BUSCAR..." oninput="posSearch()">
                    <div id="pos-info" class="card" style="min-height: 50px;">ESPERANDO...</div>
                    <button class="btn" onclick="addToCart()" style="width: 100%;">AÑADIR</button>
                </div>
                <div class="card">
                    <h3>CARRITO</h3>
                    <div id="cart-items" style="height: 150px; overflow-y: auto;"></div>
                    <div style="font-size: 24px; text-align: right; border-top: 1px solid var(--amber); padding-top: 10px;">TOTAL: $<span id="cart-total">0</span></div>
                    <button class="btn" onclick="processSale()" style="width: 100%; margin-top: 10px; background: var(--amber); color: #000;">COBRAR</button>
                </div>
            </div>
        </div>

        <div id="sec-orden" class="section">
            <h2>> SERVICIOS_TECNICOS</h2>
            <div class="card">
                <div class="grid-responsive">
                    <input id="o-cliente" placeholder="CLIENTE">
                    <input id="o-eq" placeholder="DISPOSITIVO">
                    <input id="o-falla" placeholder="FALLA">
                    <input id="o-pc" type="number" placeholder="PRECIO TOTAL">
                    <input id="o-ant" type="number" placeholder="ANTICIPO" oninput="calcOrder()">
                </div>
                <div style="font-size: 20px; margin-bottom: 10px;">SALDO PENDIENTE: $<span id="o-sal-display">0</span></div>
                <button class="btn" onclick="saveOrder()" style="width: 100%;">CREAR ORDEN</button>
            </div>
            <div id="orders-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, query, orderBy, 
        doc, updateDoc, deleteDoc, Timestamp, runTransaction, getDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let localAcc = [];
    let cart = [];

    // --- NAVEGACION ---
    window.nav = (id) => {
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.getElementById("sec-" + id).classList.add("active");
    };

    // --- INVENTARIO ---
    window.saveAccesorio = async () => {
        const nom = document.getElementById("a-nom").value;
        const stock = parseInt(document.getElementById("a-stock").value);
        if(!nom || isNaN(stock)) return;
        await addDoc(collection(db, "accesorios"), {
            nombre: nom, stock: stock,
            costo: parseFloat(document.getElementById("a-costo").value) || 0,
            pv: parseFloat(document.getElementById("a-pv").value) || 0,
            entradas: stock, salidas: 0, ts: Timestamp.now()
        });
        alert("REGISTRADO");
    };

    onSnapshot(collection(db, "accesorios"), snap => {
        localAcc = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const table = document.getElementById("acc-table");
        table.innerHTML = "";
        localAcc.forEach(a => {
            table.innerHTML += `<tr>
                <td>${a.nombre}</td>
                <td>${a.stock}</td>
                <td>E:${a.entradas} S:${a.salidas}</td>
                <td>
                    <button class="btn" onclick="openReorder('${a.id}','${a.nombre}')">+</button>
                    <button class="btn btn-del" onclick="deleteItem('accesorios','${a.id}')">X</button>
                </td>
            </tr>`;
        });
    });

    // --- ORDENES ---
    window.calcOrder = () => {
        const pc = parseFloat(document.getElementById("o-pc").value) || 0;
        const ant = parseFloat(document.getElementById("o-ant").value) || 0;
        document.getElementById("o-sal-display").innerText = (pc - ant).toFixed(2);
    };

    window.saveOrder = async () => {
        await addDoc(collection(db, "ordenes"), {
            cliente: document.getElementById("o-cliente").value,
            modelo: document.getElementById("o-eq").value,
            saldo: document.getElementById("o-sal-display").innerText,
            ts: Timestamp.now()
        });
        alert("ORDEN CREADA");
    };

    onSnapshot(query(collection(db, "ordenes"), orderBy("ts", "desc")), snap => {
        const list = document.getElementById("orders-list");
        list.innerHTML = "";
        snap.forEach(d => {
            const o = d.data();
            list.innerHTML += `
                <div class="card flex-between">
                    <div>
                        <strong>${o.cliente}</strong> | ${o.modelo}<br>
                        <small>DEUDA: $${o.saldo}</small>
                    </div>
                    <button class="btn btn-del" onclick="deleteItem('ordenes','${d.id}')">BORRAR</button>
                </div>`;
        });
    });

    // --- POS ---
    window.posSearch = () => {
        const val = document.getElementById("pos-search").value.toLowerCase();
        const item = localAcc.find(i => i.nombre.toLowerCase().includes(val));
        const info = document.getElementById("pos-info");
        if(item) {
            info.innerHTML = `${item.nombre} | $${item.pv} | STOCK: ${item.stock}`;
        } else { info.innerText = "NO ENCONTRADO"; }
    };

    window.addToCart = () => {
        const val = document.getElementById("pos-search").value.toLowerCase();
        const item = localAcc.find(i => i.nombre.toLowerCase().includes(val));
        if(item && item.stock > 0) {
            cart.push(item);
            renderCart();
        }
    };

    function renderCart() {
        const container = document.getElementById("cart-items");
        container.innerHTML = "";
        let total = 0;
        cart.forEach(i => {
            total += i.pv;
            container.innerHTML += `<div>> ${i.nombre} $${i.pv}</div>`;
        });
        document.getElementById("cart-total").innerText = total.toFixed(2);
    }

    window.processSale = async () => {
        if(cart.length === 0) return;
        await runTransaction(db, async(t) => {
            for(let item of cart) {
                const ref = doc(db, "accesorios", item.id);
                const snap = await t.get(ref);
                t.update(ref, { stock: snap.data().stock - 1, salidas: (snap.data().salidas || 0) + 1 });
            }
        });
        cart = []; renderCart(); alert("VENTA COMPLETADA");
    };

    // --- UTILIDADES ---
    window.deleteItem = async (col, id) => {
        if(confirm("¿ELIMINAR ESTE REGISTRO PERMANENTEMENTE?")) {
            await deleteDoc(doc(db, col, id));
        }
    };

    window.openReorder = (id, n) => {
        window.currentReId = id;
        document.getElementById("re-nombre").innerText = n;
        document.getElementById("reorder-modal").style.display = "block";
    };
    window.closeReorder = () => document.getElementById("reorder-modal").style.display = "none";
    window.confirmReorder = async () => {
        const q = parseInt(document.getElementById("re-qty").value);
        const ref = doc(db, "accesorios", window.currentReId);
        const snap = await getDoc(ref);
        await updateDoc(ref, { stock: snap.data().stock + q, entradas: snap.data().entradas + q });
        closeReorder();
    };

    // --- BOOT ---
    window.addEventListener("load", async () => {
        const log = document.getElementById("boot-log");
        const msgs = ["INIT NEXTCOM...", "FIREBASE CONNECTED", "READY."];
        for(let m of msgs) {
            const d = document.createElement("div"); d.innerText = m;
            log.appendChild(d);
            await new Promise(r => setTimeout(r, 400));
        }
        document.getElementById("boot").style.display = "none";
        document.getElementById("app").style.display = "flex";
    });

    setInterval(() => {
        document.getElementById("clock").innerText = new Date().toLocaleTimeString();
        document.getElementById("date-display").innerText = new Date().toISOString().split('T')[0];
    }, 1000);
</script>
</body>
</html>
