<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM_TERMINAL_V1.0.5</title>
    <style>
        /* MANTENIENDO ESTILO TERMINAL FALLOUT INTACTO */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --amber: #ffb000; --amber-dim: #945f00; --bg: #0d0d0d; --scanline: rgba(255, 176, 0, 0.03); }
        * { box-sizing: border-box; font-family: 'VT323', monospace; color: var(--amber); text-transform: uppercase; }
        body { margin: 0; background: var(--bg); letter-spacing: 1px; font-size: 1.1rem; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(var(--scanline) 50%, rgba(0, 0, 0, 0) 50%); background-size: 100% 3px; z-index: 1000; pointer-events: none; }
        header { border-bottom: 2px solid var(--amber); padding: 10px 20px; display: flex; justify-content: space-between; text-shadow: 0 0 5px var(--amber); }
        .sidebar { border-bottom: 2px solid var(--amber); display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; } .section.active { display: block; }
        .card { border: 1px solid var(--amber); padding: 15px; margin-bottom: 20px; background: rgba(255, 176, 0, 0.02); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        input, select { background: transparent; border: 1px solid var(--amber-dim); padding: 10px; width: 100%; font-size: 1.2rem; outline: none; }
        input:focus { border: 1px solid var(--amber); box-shadow: 0 0 5px var(--amber); }
        .btn { background: transparent; border: none; padding: 5px 15px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn:hover { background: var(--amber); color: var(--bg); font-weight: bold; }
        .table-terminal { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid var(--amber); }
        .table-terminal th, .table-terminal td { padding: 10px; text-align: left; border: 1px solid var(--amber-dim); }
        .order-item { border: 1px solid var(--amber); margin-bottom: 10px; padding: 10px; }
        @media (min-width: 768px) { .main-layout { display: flex; } .sidebar { width: 250px; flex-direction: column; border-right: 2px solid var(--amber); border-bottom: none; min-height: 90vh; } }
    </style>
</head>
<body>

<header>
    <div>NEXTCOM_OS > V1.0.5</div>
    <div>TERMINAL_STATUS: ONLINE</div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <button class="btn" onclick="nav('dash')">[ PANEL_ORDENES ]</button>
        <button class="btn" onclick="nav('new')">[ NUEVA_ORDEN ]</button>
        <button class="btn" onclick="nav('inv')">[ INV_REPUESTOS ]</button>
        <button class="btn" onclick="nav('acc')">[ INV_ACCESORIOS ]</button>
        <button class="btn" onclick="nav('ventas')">[ PUNTO_VENTA ]</button>
    </div>

    <div class="container">
        <div id="sec-dash" class="section active">
            <h2>> REGISTROS_ACTIVOS</h2>
            <div id="orders-list">ACCEDIENDO A BD...</div>
        </div>

        <div id="sec-new" class="section">
            <div class="card">
                <h2>> ENTRADA_DATOS_UNIDAD</h2>
                <div class="grid">
                    <div><label>CLIENTE</label><input type="text" id="o-cliente"></div>
                    <div><label>CONTACTO</label><input type="number" id="o-tel"></div>
                    <div><label>MODELO</label><input type="text" id="o-modelo" list="list-rep" oninput="logicAutoFill()"></div>
                    <div><label>FALLA_DESCRIPCION</label><input type="text" id="o-falla"></div>
                </div>
                <div class="grid" style="margin-top:20px">
                    <div><label>COSTO</label><input type="number" id="o-costo" oninput="calcSaldo()"></div>
                    <div><label>ANTICIPO</label><input type="number" id="o-anticipo" oninput="calcSaldo()"></div>
                    <div><label>SALDO_DEUDOR</label><input type="number" id="o-saldo" readonly></div>
                </div>
                <button class="btn" style="margin-top:20px" onclick="saveOrder()">[ GUARDAR_EN_NUCLEO ]</button>
            </div>
        </div>

        <div id="sec-inv" class="section">
            <div class="card">
                <h2>> ALMACEN_REPUESTOS</h2>
                <div class="grid">
                    <input type="text" id="i-tipo" placeholder="TIPO_REPUESTO">
                    <input type="text" id="i-modelo" placeholder="COMPATIBILIDAD">
                    <input type="number" id="i-precio" placeholder="PRECIO_VENTA">
                    <input type="number" id="i-stock" placeholder="CANTIDAD">
                </div>
                <button class="btn" onclick="saveInv('rep')">[ AGREGAR_REPUESTO ]</button>
                <table class="table-terminal">
                    <thead><tr><th>TIPO</th><th>MODELO</th><th>PRECIO</th><th>STOCK</th></tr></thead>
                    <tbody id="rep-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-acc" class="section">
            <div class="card">
                <h2>> ALMACEN_ACCESORIOS</h2>
                <div class="grid">
                    <input type="text" id="a-nombre" placeholder="NOMBRE_ITEM">
                    <input type="number" id="a-pv" placeholder="PRECIO_V">
                    <input type="number" id="a-stock" placeholder="CANTIDAD">
                </div>
                <button class="btn" onclick="saveInv('acc')">[ REGISTRAR_ACCESORIO ]</button>
                <table class="table-terminal">
                    <thead><tr><th>NOMBRE</th><th>STOCK</th><th>ACCIONES</th></tr></thead>
                    <tbody id="acc-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-ventas" class="section">
            <div class="grid">
                <div class="card">
                    <h2>> TERMINAL_VTA</h2>
                    <input type="text" id="v-search" list="list-acc" placeholder="ESCANEANDO..." oninput="checkAcc()">
                    <div id="v-info" style="margin:10px 0; height: 20px;"></div>
                    <button class="btn" onclick="addToCart()">[ AGREGAR_A_CARRO ]</button>
                </div>
                <div class="card">
                    <h2>> CARRO_ACTUAL</h2>
                    <div id="cart-items" style="min-height: 50px;"></div>
                    <div style="font-size:1.5rem; text-align:right; border-top: 1px solid var(--amber)">TOTAL: $<span id="v-total">0</span></div>
                    <button class="btn" style="width:100%; margin-top:10px" onclick="finishSale()">[ CONFIRMAR_TRANSACCION ]</button>
                </div>
            </div>
            <div class="card">
                <h2>> HISTORIAL_DE_TRANSACCIONES</h2>
                <div id="sales-history"></div>
            </div>
        </div>
    </div>
</div>

<datalist id="list-rep"></datalist>
<datalist id="list-acc"></datalist>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let localAcc = [];
    let localRep = [];
    let cart = [];

    // --- NAVEGACION ---
    window.nav = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
    };

    // --- LOGICA ORDENES ---
    window.calcSaldo = () => {
        const c = parseFloat(document.getElementById('o-costo').value) || 0;
        const a = parseFloat(document.getElementById('o-anticipo').value) || 0;
        document.getElementById('o-saldo').value = c - a;
    };

    window.saveOrder = async () => {
        const o = {
            cliente: document.getElementById('o-cliente').value,
            tel: document.getElementById('o-tel').value,
            modelo: document.getElementById('o-modelo').value,
            falla: document.getElementById('o-falla').value,
            costo: document.getElementById('o-costo').value,
            anticipo: document.getElementById('o-anticipo').value,
            saldo: document.getElementById('o-saldo').value,
            estado: 'RECIBIDO',
            fecha: new Date().toISOString()
        };
        await addDoc(collection(db, "ordenes"), o);
        alert("ORDEN_GUARDADA");
        nav('dash');
    };

    onSnapshot(query(collection(db, "ordenes"), orderBy("fecha", "desc")), (snap) => {
        const list = document.getElementById('orders-list');
        list.innerHTML = "";
        snap.forEach(documento => {
            const d = documento.data(); const id = documento.id;
            list.innerHTML += `<div class="order-item">
                <div>ID_UNIDAD: ${id.substring(0,6)} | CLIENTE: ${d.cliente}</div>
                <div>MODELO: ${d.modelo} | FALLA: ${d.falla}</div>
                <div>ESTADO: ${d.estado} | SALDO: $${d.saldo}</div>
                <div style="margin-top:10px">
                    <button class="btn" onclick="deleteDoc(doc(db,'ordenes','${id}'))">[ PURGAR ]</button>
                    <button class="btn" onclick="updateStatus('${id}', 'TERMINADO')">[ TERMINAR ]</button>
                </div>
            </div>`;
        });
    });

    window.updateStatus = async (id, s) => { await updateDoc(doc(db, "ordenes", id), { estado: s }); };

    // --- LOGICA INVENTARIOS (CORRECCION RENDERIZADO) ---
    window.saveInv = async (tipo) => {
        if(tipo === 'rep') {
            await addDoc(collection(db, "inventario"), { 
                tipo: document.getElementById('i-tipo').value, 
                modelo: document.getElementById('i-modelo').value, 
                precio: document.getElementById('i-precio').value, 
                stock: document.getElementById('i-stock').value, ts: new Date() 
            });
        } else {
            await addDoc(collection(db, "accesorios"), { 
                nombre: document.getElementById('a-nombre').value, 
                pv: document.getElementById('a-pv').value, 
                stock: parseInt(document.getElementById('a-stock').value), ts: new Date() 
            });
        }
        alert("REGISTRO_EXITOSO");
    };

    onSnapshot(query(collection(db, "inventario"), orderBy("ts", "desc")), (snap) => {
        const table = document.getElementById('rep-table');
        const dl = document.getElementById('list-rep');
        table.innerHTML = ""; dl.innerHTML = ""; localRep = [];
        snap.forEach(d => {
            const data = d.data();
            localRep.push(data);
            table.innerHTML += `<tr><td>${data.tipo}</td><td>${data.modelo}</td><td>$${data.precio}</td><td>${data.stock}</td></tr>`;
            dl.innerHTML += `<option value="${data.modelo}">`;
        });
    });

    onSnapshot(query(collection(db, "accesorios"), orderBy("ts", "desc")), (snap) => {
        const table = document.getElementById('acc-table');
        const dl = document.getElementById('list-acc');
        table.innerHTML = ""; dl.innerHTML = ""; localAcc = [];
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            localAcc.push({...data, id});
            table.innerHTML += `<tr><td>${data.nombre}</td><td>${data.stock}</td>
                <td><button class="btn" onclick="modStock('${id}', ${data.stock}, 1)">[ + ]</button></td></tr>`;
            dl.innerHTML += `<option value="${data.nombre}">`;
        });
    });

    window.modStock = async (id, cur, n) => { await updateDoc(doc(db, "accesorios", id), { stock: cur + n }); };

    // --- LOGICA VENTAS Y HISTORIAL (CORRECCION) ---
    window.checkAcc = () => {
        const val = document.getElementById('v-search').value;
        const item = localAcc.find(a => a.nombre === val);
        document.getElementById('v-info').innerText = item ? `UNITARIO: $${item.pv} | STOCK: ${item.stock}` : "";
    };

    window.addToCart = () => {
        const val = document.getElementById('v-search').value;
        const item = localAcc.find(a => a.nombre === val);
        if(item && item.stock > 0) {
            cart.push(item);
            renderCart();
        } else { alert("STOCK_INSUFICIENTE_O_NO_EXISTE"); }
    };

    function renderCart() {
        const c = document.getElementById('cart-items');
        c.innerHTML = ""; let t = 0;
        cart.forEach((i) => { t += parseFloat(i.pv); c.innerHTML += `<div>> ${i.nombre} ... $${i.pv}</div>`; });
        document.getElementById('v-total').innerText = t;
    }

    window.finishSale = async () => {
        if(cart.length === 0) return;
        const total = document.getElementById('v-total').innerText;
        
        // Registro en historial
        const sale = {
            productos: cart.map(i => i.nombre).join(", "),
            items: cart.map(i => ({ nombre: i.nombre, precio: i.pv })),
            total: total,
            fecha: new Date().toLocaleString(),
            ts: new Date()
        };

        try {
            for(let item of cart) {
                const ref = doc(db, "accesorios", item.id);
                await updateDoc(ref, { stock: item.stock - 1 });
            }
            await addDoc(collection(db, "ventas"), sale);
            alert("TRANSACCION_FINALIZADA");
            cart = []; renderCart(); document.getElementById('v-search').value = "";
        } catch (e) { console.error("ERR_VTA", e); }
    };

    onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (snap) => {
        const hist = document.getElementById('sales-history');
        hist.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            hist.innerHTML += `<div style="border-bottom: 1px solid var(--amber-dim); padding: 5px; font-size: 0.9rem;">
                [${s.fecha}] - TOTAL: $${s.total}<br>ITEMS: ${s.productos}</div>`;
        });
    });

</script>
</body>
</html>
