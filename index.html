<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM_OS_v2.4_ULTIMATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root { 
            --amber: #ffb000; 
            --amber-dim: #945f00; 
            --bg: #0d0d0d; 
            --scanline: rgba(255, 176, 0, 0.03); 
        }

        /* --- UI BASE --- */
        * { box-sizing: border-box; font-family: 'VT323', monospace; color: var(--amber); text-transform: uppercase; }
        body { margin: 0; background: var(--bg); overflow: hidden; letter-spacing: 1px; }

        /* --- PANTALLA DE CARGA (BOOT) --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 99999; display: flex; flex-direction: column;
            padding: 40px; overflow: hidden;
        }
        #boot-screen::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grains.jpg');
            opacity: 0.04; pointer-events: none; animation: grain-jump 0.1s steps(2) infinite;
        }
        @keyframes grain-jump { 0% { transform: translate(0,0); } 100% { transform: translate(2%, 2%); } }
        
        .boot-text { color: var(--amber); font-size: 1.4rem; margin-bottom: 4px; line-height: 1.2; }
        .cursor { display: inline-block; width: 10px; height: 1.4rem; background: var(--amber); animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- INTERFAZ PRINCIPAL --- */
        header { border-bottom: 2px solid var(--amber); padding: 10px 20px; display: flex; justify-content: space-between; background: #000; position: sticky; top: 0; z-index: 100; }
        .main-layout { display: flex; height: calc(100vh - 50px); }
        .sidebar { width: 220px; border-right: 2px solid var(--amber); padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #050505; }
        .container { flex: 1; padding: 20px; overflow-y: auto; position: relative; }
        
        .section { display: none; } 
        .section.active { display: block; }
        .card { border: 1px solid var(--amber); padding: 15px; margin-bottom: 20px; background: rgba(255, 176, 0, 0.02); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        input, select { background: transparent; border: 1px solid var(--amber-dim); padding: 8px; width: 100%; font-size: 1.1rem; outline: none; }
        .btn { background: transparent; border: 1px solid var(--amber-dim); padding: 8px; cursor: pointer; text-align: center; width: 100%; margin-top: 5px; }
        .btn:hover { background: var(--amber); color: #000; font-weight: bold; }

        /* --- TAGS DE STOCK --- */
        .tag-low { background: var(--amber); color: #000; padding: 2px 4px; animation: blink 1.5s infinite; }
        .tag-out { background: #ff0000; color: #fff; padding: 2px 4px; animation: blink 0.5s infinite; }

        .hidden-os { display: none !important; }

        /* EFECTO CRT GLOBAL */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 176, 0, 0.06); z-index: 10001; pointer-events: none;
            animation: crt-sweep 4s linear infinite;
        }
        @keyframes crt-sweep { 0% { top: 100%; } 100% { top: -5%; } }
    </style>
</head>
<body>

<div id="boot-screen">
    <div id="boot-log"></div>
    <div><span class="cursor"></span></div>
</div>

<header>
    <div>NEXTCOM_OS v2.4 // TALLER_CENTRAL</div>
    <div id="clock">00:00:00</div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <button class="btn" onclick="nav('dash')">[ 01_ORDENES ]</button>
        <button class="btn" onclick="nav('inv')">[ 02_INVENTARIO ]</button>
        <button class="btn" onclick="nav('pos')">[ 03_VENTAS_POS ]</button>
        <button class="btn" onclick="nav('hist')">[ 04_HISTORIAL ]</button>
        <div style="margin-top:auto">
            <button class="btn" onclick="showStats()">/STATS</button>
        </div>
    </div>

    <div class="container" id="app-content">
        <div id="sec-dash" class="section active">
            <h2>> ESTADO_DEL_TALLER</h2>
            <div id="orders-list">ESPERANDO_DATOS...</div>
        </div>

        <div id="sec-inv" class="section">
            <div class="card">
                <h2>> REGISTRO_DE_STOCK</h2>
                <div class="grid">
                    <input type="text" id="a-nom" placeholder="NOMBRE PRODUCTO">
                    <input type="number" id="a-costo" placeholder="COSTO">
                    <input type="number" id="a-pv" placeholder="PRECIO VENTA">
                    <input type="number" id="a-stock" placeholder="CANTIDAD">
                </div>
                <button class="btn" onclick="saveAccesorio()">[ GUARDAR EN DB ]</button>
            </div>
            <div class="card">
                <div id="acc-table-container">Cargando tabla...</div>
            </div>
        </div>

        <div id="sec-pos" class="section">
            <div class="grid">
                <div class="card">
                    <h2>> TERMINAL_VENTA</h2>
                    <input type="text" id="pos-search" placeholder="BUSCAR PRODUCTO..." oninput="posSearch()">
                    <div id="pos-info" style="margin-top:10px; min-height:30px"></div>
                    <button class="btn" onclick="addToCart()">[ AGREGAR AL CARRO ]</button>
                </div>
                <div class="card">
                    <h2>> CARRITO</h2>
                    <div id="cart-list"></div>
                    <div style="border-top:1px solid; margin-top:10px; text-align:right">TOTAL: $<span id="cart-total">0</span></div>
                    <button class="btn" onclick="processSale()">[ CONFIRMAR VENTA ]</button>
                </div>
            </div>
        </div>

        <div id="sec-hist" class="section">
            <div class="card">
                <h2>> HISTORIAL_REC RECIENTE</h2>
                <div id="vta-list"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, Timestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // CONFIGURACIÓN FIREBASE (Mantén la tuya si esta no conecta)
    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- VARIABLES DE ESTADO ---
    let localAcc = [], cart = [];

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(type === 'error' ? 150 : 800, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
        osc.start(); osc.stop(audioCtx.currentTime + (type === 'error' ? 0.3 : 0.1));
    }

    function startStaticNoise() {
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        const whiteNoise = audioCtx.createBufferSource();
        whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.01;
        whiteNoise.connect(gainNode); gainNode.connect(audioCtx.destination);
        whiteNoise.start();
        return gainNode;
    }

    // --- BOOT SEQUENCE ---
    const bootLines = [
        "NEXTCOM OS v2.4.2026",
        "SYSTEM: NEXTCOM MULTISERVICIOS",
        "TERMINAL_ID: NXT-" + Math.floor(Math.random()*9000),
        "------------------------------------",
        "LOADING CORE_KERNEL...",
        "CONNECTING FIREBASE_DB... OK",
        "SCANNING INVENTORY... 100%",
        "LOADING AUDIO_ENGINE... READY",
        "------------------------------------",
        "ACCESS GRANTED.",
        "WELCOME, TECHNICIAN."
    ];

    async function runBoot() {
        const log = document.getElementById('boot-log');
        const noise = startStaticNoise();
        for(let line of bootLines) {
            const d = document.createElement('div');
            d.className = 'boot-text'; log.appendChild(d);
            for(let c of line) { d.textContent += c; await new Promise(r => setTimeout(r, 15)); }
            await new Promise(r => setTimeout(r, line.includes('...') ? 600 : 200));
        }
        await new Promise(r => setTimeout(r, 800));
        noise.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        document.getElementById('boot-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('boot-screen').classList.add('hidden-os');
            document.body.style.overflow = 'auto';
            playBeep('nav');
        }, 800);
    }

    // --- LÓGICA DE NEGOCIO ---
    window.nav = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        playBeep('nav');
    };

    window.saveAccesorio = async () => {
        const data = {
            nombre: document.getElementById('a-nom').value,
            costo: parseFloat(document.getElementById('a-costo').value),
            pv: parseFloat(document.getElementById('a-pv').value),
            stock: parseInt(document.getElementById('a-stock').value),
            ts: Timestamp.now()
        };
        await addDoc(collection(db, "accesorios"), data);
        alert("REGISTRADO");
    };

    onSnapshot(collection(db, "accesorios"), (snap) => {
        localAcc = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const container = document.getElementById('acc-table-container');
        let html = '<table style="width:100%; border-collapse:collapse"><tr><th>ITEM</th><th>STOCK</th><th>ACCION</th></tr>';
        localAcc.forEach(a => {
            const st = a.stock <= 0 ? '<span class="tag-out">OUT</span>' : (a.stock <= 2 ? '<span class="tag-low">LOW</span>' : 'OK');
            html += `<tr><td>${a.nombre}</td><td>${a.stock} ${st}</td><td><button onclick="deleteDoc(doc(db,'accesorios','${a.id}'))">X</button></td></tr>`;
        });
        container.innerHTML = html + '</table>';
    });

    // --- POS & HISTORIAL ---
    window.posSearch = () => {
        const val = document.getElementById('pos-search').value.toLowerCase();
        const item = localAcc.find(i => i.nombre.toLowerCase().includes(val));
        document.getElementById('pos-info').innerText = item ? `STK: ${item.stock} | PRECIO: $${item.pv}` : "---";
    };

    window.addToCart = () => {
        const val = document.getElementById('pos-search').value.toLowerCase();
        const item = localAcc.find(i => i.nombre.toLowerCase().includes(val));
        if(item && item.stock > 0) {
            cart.push(item);
            renderCart();
            playBeep('nav');
        } else {
            playBeep('error');
        }
    };

    function renderCart() {
        const l = document.getElementById('cart-list'); l.innerHTML = "";
        let t = 0;
        cart.forEach(i => { t += i.pv; l.innerHTML += `<div>> ${i.nombre} - $${i.pv}</div>`; });
        document.getElementById('cart-total').innerText = t;
    }

    window.processSale = async () => {
        if(cart.length === 0) return;
        for(let i of cart) {
            const ref = doc(db, "accesorios", i.id);
            await updateDoc(ref, { stock: i.stock - 1 });
        }
        await addDoc(collection(db, "ventas"), {
            total: cart.reduce((a,b)=>a+b.pv, 0),
            items: cart.map(i => i.nombre),
            ts: Timestamp.now()
        });
        cart = []; renderCart(); alert("VENTA EXITOSA");
    };

    onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (snap) => {
        const l = document.getElementById('vta-list'); l.innerHTML = "";
        snap.forEach(d => {
            const v = d.data();
            l.innerHTML += `<div style="border-bottom:1px solid var(--amber-dim)">[${v.ts.toDate().toLocaleTimeString()}] TOTAL: $${v.total} <br> ${v.items.join(", ")}</div>`;
        });
    });

    // --- RELOJ ---
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    // --- INICIAR ---
    runBoot();

</script>
</body>
</html>
