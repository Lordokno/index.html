<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM_OS_v2.1_MIL-SPEC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --amber: #ffb000; --amber-dim: #945f00; --bg: #0d0d0d; --scanline: rgba(255, 176, 0, 0.03); --crt-line: rgba(255, 176, 0, 0.06); }
        * { box-sizing: border-box; font-family: 'VT323', monospace; color: var(--amber); text-transform: uppercase; }
        body { margin: 0; background: var(--bg); overflow-x: hidden; letter-spacing: 1px; }

        /* EFECTO BARRIDO CRT */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--crt-line); z-index: 10001; pointer-events: none;
            animation: crt-sweep 4s linear infinite;
        }
        @keyframes crt-sweep { 0% { top: 100%; } 100% { top: -5%; } }

        /* SCANLINES ESTÁTICAS */
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(var(--scanline) 50%, rgba(0, 0, 0, 0) 50%); background-size: 100% 2px; z-index: 9999; pointer-events: none; }

        header { border-bottom: 2px solid var(--amber); padding: 10px 20px; display: flex; justify-content: space-between; background: #000; }
        .main-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; border-right: 2px solid var(--amber); padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .container { flex: 1; padding: 20px; max-width: 1400px; }
        
        .section { display: none; } .section.active { display: block; }
        .card { border: 1px solid var(--amber); padding: 15px; margin-bottom: 20px; background: rgba(255, 176, 0, 0.02); }

        input, select { background: transparent; border: 1px solid var(--amber-dim); padding: 8px; width: 100%; font-size: 1.1rem; outline: none; }
        input:focus { border: 1px solid var(--amber); border-left: 5px solid var(--amber); }

        .btn { background: transparent; border: 1px solid var(--amber-dim); padding: 5px 15px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn:hover { background: var(--amber); color: #000; font-weight: bold; }

        .prio-express { border: 2px solid var(--amber) !important; box-shadow: inset 0 0 10px var(--amber-dim); background: rgba(255, 176, 0, 0.08) !important; }
        .st-alert { color: #ff0000; animation: blink 1s infinite; border: 1px solid #ff0000; padding: 5px; margin-bottom: 10px; text-align: center; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        #stats-overlay { display:none; position:fixed; top:15%; left:15%; width:70%; height:70%; background:#000; border:2px solid var(--amber); z-index:10002; padding:30px; }
    </style>
</head>
<body>

<header>
    <div>NEXTCOM_OS v2.1 // MILITARY_GRADE</div>
    <div id="clock">00:00:00</div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <button class="btn" onclick="nav('dash')">01_ORDENES</button>
        <button class="btn" onclick="nav('new')">02_REGISTRO</button>
        <button class="btn" onclick="nav('pos')">03_VENTAS</button>
        <div style="margin-top:auto">
            <button class="btn" onclick="showStats()" style="width:100%">/STATS</button>
        </div>
    </div>

    <div class="container">
        <div id="alert-zone"></div>

        <div class="card">
            <label>> BUSQUEDA_GLOBAL / HISTORIAL_CLIENTE:</label>
            <input type="text" id="gSearch" placeholder="INGRESE CLIENTE O MODELO..." oninput="handleSearch()">
            <div id="historial-box" style="margin-top:10px; font-size:0.9rem; display:none;">
                <div style="border-bottom:1px solid">=== HISTORIAL_DEL_CLIENTE ===</div>
                <div id="historial-list"></div>
            </div>
        </div>

        <div id="sec-dash" class="section active">
            <div id="orders-list">CARGANDO_DATOS...</div>
        </div>

        <div id="sec-new" class="section">
            <div class="card">
                <h2>> REGISTRO_PROTOCOL_V2.1</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <input type="text" id="o-cliente" placeholder="CLIENTE">
                    <input type="text" id="o-eq" placeholder="MODELO">
                    <input type="text" id="o-falla" placeholder="FALLA">
                    <select id="o-prio">
                        <option value="NORMAL">PRIORIDAD: NORMAL</option>
                        <option value="URGENTE">PRIORIDAD: URGENTE</option>
                        <option value="EXPRESS">PRIORIDAD: EXPRESS</option>
                    </select>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px; margin-top:15px">
                    <div>COSTO_R:<input type="number" id="o-cr" oninput="calcM()"></div>
                    <div>PRECIO_C:<input type="number" id="o-pc" oninput="calcM()"></div>
                    <div>GANANCIA:<input type="number" id="o-gan" readonly></div>
                    <div>MARGEN%:<input type="text" id="o-mar" readonly></div>
                </div>
                <button class="btn" style="margin-top:20px; width:100%" onclick="saveOrder()">[ EJECUTAR_ORDEN ]</button>
            </div>
        </div>
    </div>
</div>

<div id="stats-overlay">
    <h2>=== ANALISIS_DE_SISTEMA_STATS ===</h2>
    <div id="stats-content" style="line-height:1.6; font-size:1.3rem"></div>
    <button class="btn" style="margin-top:20px" onclick="this.parentElement.style.display='none'">[ CERRAR_CONSOLA ]</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPdvXiBKQxFmxNJdqov1CSbNe16WWIXm8",
        authDomain: "nextcom--multiservicos-server.firebaseapp.com",
        projectId: "nextcom--multiservicos-server",
        storageBucket: "nextcom--multiservicos-server.firebasestorage.app",
        messagingSenderId: "1011344400777",
        appId: "1:1011344400777:web:e40a1a66d9f77046bd8158"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allOrders = [];

    // --- RELOJ Y COMANDOS ---
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.addEventListener('keydown', (e) => { if(e.key === 'F2') showStats(); });

    // --- CALCULO MARGEN ---
    window.calcM = () => {
        const cr = parseFloat(document.getElementById('o-cr').value) || 0;
        const pc = parseFloat(document.getElementById('o-pc').value) || 0;
        const g = pc - cr;
        const m = pc > 0 ? ((g / pc) * 100).toFixed(1) : 0;
        document.getElementById('o-gan').value = g;
        document.getElementById('o-mar').value = m + "%";
    };

    // --- GESTIÓN DE ORDENES ---
    window.saveOrder = async () => {
        const data = {
            cliente: document.getElementById('o-cliente').value,
            modelo: document.getElementById('o-eq').value,
            falla: document.getElementById('o-falla').value,
            prio: document.getElementById('o-prio').value,
            ganancia: parseFloat(document.getElementById('o-gan').value),
            costo: parseFloat(document.getElementById('o-pc').value),
            ts: Timestamp.now(),
            estado: 'RECIBIDO'
        };
        await addDoc(collection(db, "ordenes"), data);
        nav('dash');
    };

    onSnapshot(query(collection(db, "ordenes"), orderBy("ts", "desc")), (snap) => {
        allOrders = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderOrders();
        checkRetiros();
    });

    function renderOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = "";
        // Ordenar: EXPRESS primero
        const sorted = [...allOrders].sort((a,b) => (b.prio === 'EXPRESS') - (a.prio === 'EXPRESS'));
        
        sorted.forEach(o => {
            const isExpress = o.prio === 'EXPRESS';
            list.innerHTML += `
                <div class="card ${isExpress ? 'prio-express' : ''}">
                    <div style="display:flex; justify-content:space-between">
                        <span>${isExpress ? '[!] PRIORIDAD_MAXIMA' : 'REF: '+o.id.substring(0,6)}</span>
                        <span>MOD: ${o.modelo}</span>
                    </div>
                    <div style="font-size:1.4rem">CLIENTE: ${o.cliente}</div>
                    <div>ESTADO: ${o.estado} | MONTO: $${o.costo}</div>
                </div>`;
        });
    }

    // --- ALERTA DE RETIRO (30 DIAS) ---
    function checkRetiros() {
        const alertZone = document.getElementById('alert-zone');
        alertZone.innerHTML = "";
        const limit = 30 * 24 * 60 * 60 * 1000;
        const oldOnes = allOrders.filter(o => (Date.now() - o.ts.toMillis() > limit) && o.estado !== 'ENTREGADO');
        if(oldOnes.length > 0) {
            alertZone.innerHTML = `<div class="st-alert">ALERTA: ${oldOnes.length} EQUIPO(S) PENDIENTE(S) DE RETIRO (+30 DIAS)</div>`;
        }
    }

    // --- BUSQUEDA E HISTORIAL ---
    window.handleSearch = () => {
        const val = document.getElementById('gSearch').value.toLowerCase();
        const histBox = document.getElementById('historial-box');
        const histList = document.getElementById('historial-list');
        
        if(val.length > 2) {
            const matches = allOrders.filter(o => o.cliente.toLowerCase().includes(val));
            if(matches.length > 0) {
                histBox.style.display = "block";
                histList.innerHTML = matches.map(m => `<div>> ${m.ts.toDate().toLocaleDateString()} | ${m.modelo} | $${m.costo} | ${m.estado}</div>`).join("");
            }
        } else { histBox.style.display = "none"; }
    }

    // --- COMANDO /STATS ---
    window.showStats = () => {
        const overlay = document.getElementById('stats-overlay');
        const content = document.getElementById('stats-content');
        const totalG = allOrders.reduce((acc, curr) => acc + (curr.ganancia || 0), 0);
        const totalV = allOrders.reduce((acc, curr) => acc + (curr.costo || 0), 0);
        
        content.innerHTML = `
            > TOTAL_REPARACIONES: ${allOrders.length}<br>
            > TOTAL_VENTAS_BRUTAS: $${totalV.toFixed(2)}<br>
            > GANANCIA_TOTAL_EST: $${totalG.toFixed(2)}<br>
            > MARGEN_PROMEDIO: ${((totalG/totalV)*100).toFixed(1)}%<br>
            > ESTADO_SISTEMA: EN LINEA (V2.1)
        `;
        overlay.style.display = 'block';
    };

    window.nav = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
    };
</script>
</body>
</html>
