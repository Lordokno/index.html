<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXTCOM OS v2.6 PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  background:black;
  color:#ff7a00;
  font-family: "Courier New", monospace;
  overflow-x:hidden;
}

header {
  padding:10px;
  border-bottom:1px solid #ff7a00;
}

button {
  background:black;
  color:#ff7a00;
  border:1px solid #ff7a00;
  padding:5px 10px;
  margin:3px;
  cursor:pointer;
}

button:hover {
  background:#ff7a00;
  color:black;
}

.section {
  padding:15px;
}

.product {
  border-bottom:1px solid #333;
  padding:8px;
}

.low { color: yellow; }
.out { color: red; }

#boot {
  position:fixed;
  inset:0;
  background:black;
  color:#ff7a00;
  padding:20px;
  font-size:14px;
}

canvas {
  background:black;
}
</style>
</head>
<body>

<div id="boot"></div>

<header>
  NEXTCOM OS v2.6 PRO
  <button onclick="showSection('inventory')">INVENTARIO</button>
  <button onclick="showSection('stats')">ESTADISTICAS</button>
</header>

<div id="inventory" class="section"></div>
<div id="stats" class="section" style="display:none;">
  <canvas id="salesChart"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, runTransaction, addDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const bootMessages = [
"> BOOTING NEXTCOM OS v2.6 PRO...",
"> Cargando Inventario... OK",
"> Cargando Ventas... OK",
"> Cargando Facturación... OK",
"> Sistema listo."
];

let bootDiv = document.getElementById("boot");
let i = 0;

function bootSystem(){
  if(i < bootMessages.length){
    bootDiv.innerHTML += bootMessages[i] + "<br>";
    i++;
    setTimeout(bootSystem,500);
  } else {
    setTimeout(()=> bootDiv.style.display="none",1000);
    loadInventory();
  }
}
bootSystem();

function showSection(id){
  document.getElementById("inventory").style.display="none";
  document.getElementById("stats").style.display="none";
  document.getElementById(id).style.display="block";
}

async function loadInventory(){
  const snapshot = await getDocs(collection(db,"inventario"));
  const container = document.getElementById("inventory");
  container.innerHTML = "";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    let status = "";
    let classStatus = "";

    if(data.stock <= 0){
      status="OUT";
      classStatus="out";
    } else if(data.stock <= data.stockMinimo){
      status="LOW";
      classStatus="low";
    }

    container.innerHTML += `
      <div class="product">
        ${data.nombre} - Stock: ${data.stock}
        <span class="${classStatus}">${status}</span><br>
        <button onclick="addToCart('${docSnap.id}')">+</button>
        <button onclick="restock('${docSnap.id}')">+STOCK</button>
        <button onclick="adjust('${docSnap.id}')">-STOCK</button>
      </div>
    `;
  });
}

async function restock(id){
  let qty = parseInt(prompt("Cantidad a agregar:"));
  if(!qty || qty<=0) return alert("Cantidad inválida");

  const ref = doc(db,"inventario",id);

  await runTransaction(db, async (transaction)=>{
    const snap = await transaction.get(ref);
    const data = snap.data();
    transaction.update(ref,{
      stock: data.stock + qty,
      totalEntradas: (data.totalEntradas||0)+qty
    });
  });

  loadInventory();
}

async function adjust(id){
  let qty = parseInt(prompt("Cantidad a descontar:"));
  if(!qty || qty<=0) return alert("Cantidad inválida");

  const ref = doc(db,"inventario",id);

  await runTransaction(db, async (transaction)=>{
    const snap = await transaction.get(ref);
    const data = snap.data();
    if(data.stock < qty) throw "Stock insuficiente";
    transaction.update(ref,{
      stock: data.stock - qty
    });
  });

  loadInventory();
}

async function generateChart(){
  const snapshot = await getDocs(collection(db,"facturas"));
  let daily = {};

  snapshot.forEach(doc=>{
    const data = doc.data();
    if(data.estado !== "ACTIVA") return;
    let day = new Date(data.fecha.seconds*1000).getDate();
    daily[day] = (daily[day]||0) + data.total;
  });

  const labels = Object.keys(daily);
  const values = Object.values(daily);

  new Chart(document.getElementById("salesChart"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:"Ventas",
        data:values,
        borderColor:"#ff7a00",
        backgroundColor:"transparent"
      }]
    }
  });
}

showSection("inventory");

</script>
</body>
</html>
